<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ad 01 — 1080×1080</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #09090b;
      font-family: 'Geist Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes rainbow-glow {
      0%   { filter: blur(14px) hue-rotate(0deg); }
      100% { filter: blur(14px) hue-rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes revealLine {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.28; }
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #09090b;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Grand cercle de lumière derrière le texte */
    .bg-glow {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 65%);
      pointer-events: none;
      animation: glow-pulse 4s ease-in-out infinite;
    }

    /* ── TOP ── */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.1s;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #fafafa;
      letter-spacing: -0.03em;
    }

    .top-tag {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 100px;
      letter-spacing: 0.02em;
    }

    /* ── HERO TEXT ── */
    .hero {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .line1 {
      font-size: 108px;
      font-weight: 800;
      color: rgba(255,255,255,0.22);
      letter-spacing: -0.05em;
      line-height: 0.92;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.3s;
    }

    .line2 {
      font-size: 108px;
      font-weight: 800;
      color: rgba(255,255,255,0.22);
      letter-spacing: -0.05em;
      line-height: 0.92;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
    }

    /* La ligne clé — blanc pur, elle tranche */
    .line-key {
      font-size: 108px;
      font-weight: 800;
      color: #fafafa;
      letter-spacing: -0.05em;
      line-height: 0.92;
      margin-top: 6px;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards 0.8s;
    }

    .line3 {
      font-size: 108px;
      font-weight: 800;
      color: rgba(255,255,255,0.22);
      letter-spacing: -0.05em;
      line-height: 0.92;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 1.1s;
    }

    /* Trait de séparation animé */
    .separator {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 36px 0 32px;
      clip-path: inset(0 100% 0 0);
      animation: revealLine 0.8s ease forwards 1.4s;
    }

    /* Sous-texte */
    .sub {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
      max-width: 680px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.7s;
    }

    .sub strong {
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* ── BOTTOM ── */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 2.1s;
    }

    .bottom-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .price-old {
      font-family: 'Geist Mono', monospace;
      font-size: 18px;
      color: rgba(255,255,255,0.2);
      text-decoration: line-through;
    }

    .price-new {
      font-family: 'Geist Mono', monospace;
      font-size: 52px;
      font-weight: 800;
      color: #fafafa;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .price-note {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }

    /* CTA rainbow */
    .cta-rainbow {
      position: relative;
      background: #fafafa;
      color: #09090b;
      font-size: 17px;
      font-weight: 700;
      padding: 18px 36px;
      border-radius: 10px;
      letter-spacing: -0.02em;
    }

    .cta-rainbow::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      background: conic-gradient(from 0deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #cc5de8, #ff6b6b);
      z-index: -1;
      filter: blur(14px);
      opacity: 0.7;
      animation: rainbow-glow 3s linear infinite;
    }
  </style>
</head>
<body>
<div class="canvas">

  <div class="bg-glow"></div>

  <div class="top">
    <div class="logo">
      <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="9" fill="#27272a"/>
        <line x1="13.5" y1="6" x2="13.5" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <line x1="22.5" y1="6" x2="22.5" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <line x1="6" y1="13.5" x2="30" y2="13.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <line x1="6" y1="22.5" x2="30" y2="22.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Buildrs</span>
    </div>
    <span class="top-tag">buildrs.fr</span>
  </div>

  <div class="hero">
    <div class="line1">Arrête de</div>
    <div class="line2">suivre les</div>
    <div class="line-key">tendances IA.</div>
    <div class="line3">Lance la prochaine.</div>
    <div class="separator"></div>
    <div class="sub">
      <strong>Tu as tout pour réussir.</strong> Claude code à ta place.
      Ton SaaS, ton app, ton logiciel — live en <strong>6 jours.</strong>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-left">
      <div class="price-row">
        <span class="price-old">197€</span>
        <span class="price-new">27€</span>
      </div>
      <span class="price-note">Accès à vie · 82/100 places</span>
    </div>
    <div class="cta-rainbow">Commencer maintenant →</div>
  </div>

</div>
</body>
</html>
