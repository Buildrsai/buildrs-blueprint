<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880" width="1040" height="880">
  <defs>
    <style>
      text { font-family: -apple-system, "SF Pro Display", Inter, sans-serif; }
      .heading { font-weight: 600; fill: #0A0A0A; }
      .body { font-weight: 400; fill: #0A0A0A; }
      .caption { font-weight: 500; fill: #6B7280; font-size: 12px; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1040" height="880" fill="#FAFAFA"/>

  <!-- Section: "EN LIGNE" label left -->
  <g id="en-ligne-label">
    <text x="80" y="430" font-size="42" font-weight="800" fill="#0A0A0A" letter-spacing="-1">EN LIGNE</text>
  </g>

  <!-- Section: Left segmented bars (12 bars, 2 rows, all filled) -->
  <g id="bars-left">
    <!-- Row 1 -->
    <rect x="80" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="91" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="102" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="113" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="124" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="135" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="146" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="157" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="168" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="179" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="190" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="201" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <!-- Row 2 -->
    <rect x="80" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="91" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="102" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="113" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="124" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="135" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="146" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="157" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="168" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="179" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="190" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="201" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
  </g>

  <!-- Section: Center iPhone mockup (slight forward tilt 5 degrees) -->
  <g id="iphone-mockup" transform="rotate(-5, 520, 440)" filter="url(#softShadow)">
    <!-- Outer frame -->
    <rect x="380" y="140" width="280" height="580" rx="48" fill="#0A0A0A"/>
    <!-- Inner screen -->
    <rect x="394" y="160" width="252" height="540" rx="38" fill="#FFFFFF"/>
    <!-- Notch -->
    <rect x="466" y="160" width="108" height="28" rx="14" fill="#0A0A0A"/>
    <!-- Status bar -->
    <text x="402" y="182" font-size="11" fill="#6B7280">9:41</text>
    <rect x="608" y="174" width="18" height="6" rx="2" fill="#6B7280"/>
    <rect x="600" y="176" width="6" height="4" rx="1" fill="#6B7280"/>
    <rect x="592" y="175" width="6" height="5" rx="1" fill="#6B7280"/>

    <!-- Screen — deployed app layout -->
    <!-- Header -->
    <rect x="402" y="198" width="234" height="32" rx="6" fill="#0A0A0A"/>
    <rect x="414" y="209" width="60" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>

    <!-- Hero banner -->
    <rect x="402" y="238" width="234" height="100" rx="8" fill="#2A2A2A"/>
    <rect x="414" y="258" width="140" height="10" rx="5" fill="#FFFFFF" opacity="0.7"/>
    <rect x="414" y="274" width="100" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
    <rect x="414" y="290" width="120" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
    <!-- CTA on hero -->
    <rect x="414" y="308" width="80" height="22" rx="6" fill="#FFFFFF"/>
    <rect x="420" y="314" width="68" height="8" rx="4" fill="#2A2A2A"/>

    <!-- Feature grid -->
    <rect x="402" y="348" width="110" height="80" rx="8" fill="#F3F4F6"/>
    <rect x="526" y="348" width="110" height="80" rx="8" fill="#F3F4F6"/>
    <rect x="402" y="438" width="110" height="80" rx="8" fill="#F3F4F6"/>
    <rect x="526" y="438" width="110" height="80" rx="8" fill="#F3F4F6"/>

    <!-- Pricing section -->
    <rect x="402" y="528" width="234" height="100" rx="8" fill="#F3F4F6"/>
    <rect x="414" y="544" width="80" height="8" rx="4" fill="#D1D5DB"/>
    <rect x="414" y="558" width="120" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="414" y="570" width="100" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="414" y="586" width="60" height="20" rx="6" fill="#0A0A0A"/>

    <!-- Home indicator -->
    <rect x="496" y="688" width="46" height="4" rx="2" fill="#6B7280"/>
  </g>

  <!-- Section: Right segmented bars (12 bars, 2 rows, all filled) -->
  <g id="bars-right">
    <!-- Row 1 -->
    <rect x="751" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="762" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="773" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="784" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="795" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="806" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="817" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="828" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="839" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="850" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="861" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="872" y="450" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <!-- Row 2 -->
    <rect x="751" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="762" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="773" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="784" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="795" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="806" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="817" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="828" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="839" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="850" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="861" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
    <rect x="872" y="490" width="8" height="32" rx="2" fill="#0A0A0A"/>
  </g>

  <!-- Section: HTTPS badge bottom-right -->
  <g id="https-badge" filter="url(#softShadow)">
    <circle cx="860" cy="680" r="50" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <!-- Lock icon -->
    <rect x="848" y="672" width="24" height="20" rx="4" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    <rect x="854" y="678" width="12" height="8" rx="2" fill="#0A0A0A"/>
    <path d="M852 672 C852 664 868 664 868 672" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
    <text x="860" y="742" class="caption" text-anchor="middle" font-size="11">HTTPS</text>
  </g>

  <!-- Section: Vercel brand floating tile -->
  <g id="vercel-badge" filter="url(#softShadow)">
    <rect x="845" y="560" width="120" height="52" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Vercel triangle: viewBox 0 0 512 512 → 24px → scale 0.047 centered at (879, 586) -->
    <g transform="translate(867, 574) scale(0.047)">
      <path d="M256 48L496 464H16L256 48Z" fill="#0A0A0A"/>
    </g>
    <text x="896" y="591" font-size="12" font-weight="600" fill="#0A0A0A">Vercel</text>
  </g>

  <!-- Section: "Déployé" pill top-right -->
  <g id="deployed-pill" filter="url(#softShadow)">
    <rect x="700" y="140" width="220" height="40" rx="20" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Validation circle -->
    <circle cx="725" cy="160" r="10" fill="#0A0A0A"/>
    <path d="M721 160 L724 163 L730 157" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Vercel mini triangle inline -->
    <g transform="translate(740, 149) scale(0.043)">
      <path d="M256 48L496 464H16L256 48Z" fill="#0A0A0A"/>
    </g>
    <text x="762" y="165" class="body" font-size="13">Déployé sur Vercel</text>
  </g>

  <!-- Bottom caption -->
  <text x="520" y="800" class="caption" text-anchor="middle" font-size="13">Ton app, accessible au monde en quelques minutes</text>

</svg>
