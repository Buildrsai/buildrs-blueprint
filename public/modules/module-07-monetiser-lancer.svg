<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880">
  <defs>
    <style>
      text { font-family: -apple-system, "SF Pro Display", Inter, sans-serif; }
      .heading { font-weight: 600; fill: #0A0A0A; }
      .body { font-weight: 400; fill: #0A0A0A; }
      .caption { font-weight: 500; fill: #6B7280; font-size: 12px; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A2A"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FAFAFA"/>

  <!-- Section: iPhone mockup (left) -->
  <g id="iphone-mockup" filter="url(#softShadow)">
    <!-- Outer frame -->
    <rect x="120" y="120" width="280" height="580" rx="48" fill="#0A0A0A"/>
    <!-- Inner screen -->
    <rect x="134" y="140" width="252" height="540" rx="38" fill="#FFFFFF"/>
    <!-- Notch -->
    <rect x="206" y="140" width="108" height="28" rx="14" fill="#0A0A0A"/>
    <!-- Status bar -->
    <text x="142" y="162" font-size="11" fill="#6B7280">9:41</text>
    <rect x="348" y="154" width="18" height="6" rx="2" fill="#6B7280"/>
    <rect x="340" y="156" width="6" height="4" rx="1" fill="#6B7280"/>
    <rect x="332" y="155" width="6" height="5" rx="1" fill="#6B7280"/>

    <!-- Screen content -->
    <!-- Dashboard header -->
    <rect x="142" y="178" width="234" height="32" rx="6" fill="#0A0A0A"/>
    <rect x="154" y="189" width="70" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>

    <!-- Metric cards -->
    <rect x="142" y="220" width="110" height="72" rx="8" fill="#F3F4F6"/>
    <rect x="266" y="220" width="110" height="72" rx="8" fill="#F3F4F6"/>
    <rect x="152" y="234" width="50" height="8" rx="4" fill="#D1D5DB"/>
    <rect x="152" y="248" width="80" height="14" rx="4" fill="#0A0A0A"/>
    <rect x="276" y="234" width="50" height="8" rx="4" fill="#D1D5DB"/>
    <rect x="276" y="248" width="80" height="14" rx="4" fill="#0A0A0A"/>

    <!-- Chart area -->
    <rect x="142" y="302" width="234" height="100" rx="8" fill="#F3F4F6"/>
    <!-- Chart bars inside -->
    <rect x="156" y="360" width="16" height="28" rx="2" fill="#D1D5DB"/>
    <rect x="178" y="346" width="16" height="42" rx="2" fill="#D1D5DB"/>
    <rect x="200" y="334" width="16" height="54" rx="2" fill="#0A0A0A"/>
    <rect x="222" y="342" width="16" height="46" rx="2" fill="#D1D5DB"/>
    <rect x="244" y="322" width="16" height="66" rx="2" fill="#0A0A0A"/>
    <rect x="266" y="336" width="16" height="52" rx="2" fill="#D1D5DB"/>
    <rect x="288" y="318" width="16" height="70" rx="2" fill="#0A0A0A"/>
    <rect x="310" y="328" width="16" height="60" rx="2" fill="#D1D5DB"/>
    <rect x="332" y="308" width="20" height="80" rx="2" fill="#0A0A0A"/>

    <!-- Transactions list -->
    <rect x="142" y="412" width="234" height="44" rx="8" fill="#F3F4F6"/>
    <rect x="154" y="424" width="80" height="7" rx="3" fill="#D1D5DB"/>
    <rect x="154" y="436" width="60" height="5" rx="2" fill="#D1D5DB"/>
    <rect x="336" y="426" width="24" height="10" rx="3" fill="#0A0A0A"/>

    <rect x="142" y="464" width="234" height="44" rx="8" fill="#F3F4F6"/>
    <rect x="154" y="476" width="90" height="7" rx="3" fill="#D1D5DB"/>
    <rect x="154" y="488" width="70" height="5" rx="2" fill="#D1D5DB"/>
    <rect x="336" y="478" width="24" height="10" rx="3" fill="#0A0A0A"/>

    <rect x="142" y="516" width="234" height="44" rx="8" fill="#F3F4F6"/>
    <rect x="154" y="528" width="75" height="7" rx="3" fill="#D1D5DB"/>
    <rect x="154" y="540" width="55" height="5" rx="2" fill="#D1D5DB"/>
    <rect x="336" y="530" width="24" height="10" rx="3" fill="#0A0A0A"/>

    <!-- Bottom content -->
    <rect x="142" y="570" width="234" height="80" rx="8" fill="#F3F4F6"/>
    <rect x="142" y="660" width="234" height="6" rx="3" fill="#F3F4F6"/>

    <!-- Home indicator -->
    <rect x="236" y="668" width="46" height="4" rx="2" fill="#6B7280"/>
  </g>

  <!-- Section: BLACK DASHED path with 4 connection points on screen -->
  <g id="dashed-funnel-path">
    <!-- 4 points on phone screen edge -->
    <circle cx="388" cy="256" r="6" fill="#0A0A0A"/>
    <circle cx="388" cy="344" r="6" fill="#0A0A0A"/>
    <circle cx="388" cy="436" r="6" fill="#0A0A0A"/>
    <circle cx="388" cy="488" r="6" fill="#0A0A0A"/>
    <!-- Dashed path connecting them -->
    <path d="M388 256 C420 256 440 300 440 344 C440 390 420 412 388 436 C360 460 380 470 388 488"
          stroke="#0A0A0A" stroke-dasharray="4 4" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Section: Media player bar below iPhone -->
  <g id="media-player" filter="url(#softShadow)">
    <rect x="140" y="732" width="240" height="40" rx="20" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Pause icon -->
    <rect x="156" y="744" width="5" height="16" rx="2" fill="#0A0A0A"/>
    <rect x="164" y="744" width="5" height="16" rx="2" fill="#0A0A0A"/>
    <!-- Timeline bar -->
    <rect x="178" y="751" width="96" height="4" rx="2" fill="#F3F4F6"/>
    <rect x="178" y="751" width="36" height="4" rx="2" fill="#0A0A0A"/>
    <!-- Time -->
    <text x="284" y="756" font-size="10" fill="#6B7280" font-family="monospace">00:12</text>
  </g>

  <!-- Section: Video preview card top-right -->
  <g id="video-card" filter="url(#softShadow)">
    <rect x="680" y="100" width="280" height="180" rx="12" fill="url(#darkGrad)"/>
    <!-- Abstract person silhouette -->
    <circle cx="780" cy="148" r="24" fill="#FAFAFA" opacity="0.15"/>
    <path d="M756 188 C756 172 764 164 780 162 C796 164 804 172 804 188" fill="#FAFAFA" opacity="0.1"/>
    <!-- Time badge top-left -->
    <circle cx="704" cy="120" r="14" fill="#FFFFFF" opacity="0.9"/>
    <text x="699" y="124" font-size="8" fill="#0A0A0A" font-family="monospace">00:12</text>
    <!-- Circular icons bottom-right -->
    <circle cx="918" cy="256" r="14" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="896" cy="256" r="14" fill="#FFFFFF" opacity="0.2"/>
    <!-- Play-like icon inside -->
    <polygon points="912 250 912 262 922 256" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Section: Pricing card middle-right -->
  <g id="pricing-card" filter="url(#softShadow)">
    <rect x="680" y="320" width="280" height="160" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="700" y="350" class="heading" font-size="15">Premiers revenus</text>
    <line x1="688" y1="360" x2="952" y2="360" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Pill: 47€ -->
    <rect x="700" y="372" width="72" height="32" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="736" y="393" font-size="13" font-weight="600" fill="#0A0A0A" text-anchor="middle">47€</text>

    <!-- Pill: 197€ -->
    <rect x="784" y="372" width="80" height="32" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="824" y="393" font-size="13" font-weight="600" fill="#0A0A0A" text-anchor="middle">197€</text>

    <!-- Pill: 497€ (black fill) -->
    <rect x="876" y="372" width="80" height="32" rx="16" fill="#0A0A0A"/>
    <text x="916" y="393" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">497€</text>

    <!-- Captions -->
    <text x="736" y="420" class="caption" font-size="10" text-anchor="middle">Module 1</text>
    <text x="824" y="420" class="caption" font-size="10" text-anchor="middle">Pack</text>
    <text x="916" y="420" class="caption" font-size="10" text-anchor="middle">Sprint</text>

    <!-- Ascending arrow between pills -->
    <path d="M774 388 C778 388 782 388 782 388" stroke="#D1D5DB" stroke-width="1" fill="none"/>
    <path d="M866 388 C870 388 874 388 874 388" stroke="#D1D5DB" stroke-width="1" fill="none"/>
    <!-- Up arrows -->
    <path d="M773 392 L778 384 L783 392" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M865 392 L870 384 L875 392" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Connector from phone to card -->
  </g>

  <!-- Section: Stripe credit card tile bottom-right -->
  <g id="credit-card-tile" filter="url(#softShadow)">
    <rect x="916" y="520" width="64" height="64" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Stripe logo: viewBox 0 0 24 24 → 32px → scale 1.333 centered at (948,552) → translate(933,537) -->
    <g transform="translate(933, 537) scale(1.333)">
      <path d="M13.976 9.15c-2.172-.806-3.356-1.426-3.356-2.409 0-.831.683-1.305 1.901-1.305 2.227 0 4.515.858 6.09 1.631l.89-5.494C18.252.975 15.697 0 12.165 0 9.667 0 7.589.654 6.104 1.872 4.56 3.147 3.757 4.992 3.757 7.218c0 4.039 2.467 5.76 6.476 7.219 2.585.92 3.445 1.574 3.445 2.583 0 .98-.84 1.545-2.354 1.545-1.875 0-4.965-.921-6.99-2.109l-.9 5.555C5.175 22.99 8.385 24 11.714 24c2.641 0 4.843-.624 6.328-1.813 1.664-1.305 2.525-3.236 2.525-5.732 0-4.128-2.524-5.851-6.594-7.305h.003z" fill="#0A0A0A"/>
    </g>
    <text x="948" y="598" class="caption" font-size="9" text-anchor="middle">Stripe</text>
  </g>

  <!-- Connecting path: phone to video card -->
  <path d="M402 190 C520 190, 600 150, 678 160" stroke="#D1D5DB" stroke-width="1" fill="none" stroke-dasharray="3 3"/>

  <!-- Connecting path: phone to pricing card -->
  <path d="M402 430 C520 420, 600 380, 678 380" stroke="#D1D5DB" stroke-width="1" fill="none" stroke-dasharray="3 3"/>

  <!-- Bottom caption -->
  <text x="520" y="816" class="caption" text-anchor="middle" font-size="13">Tes premiers clients. Tes premiers euros.</text>

</svg>
