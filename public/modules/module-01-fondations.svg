<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880" width="1040" height="880">
  <defs>
    <style>
      text { font-family: -apple-system, "SF Pro Display", Inter, sans-serif; }
      .heading { font-weight: 600; fill: #0A0A0A; }
      .body { font-weight: 400; fill: #0A0A0A; }
      .caption { font-weight: 500; fill: #6B7280; font-size: 12px; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1040" height="880" fill="#FAFAFA"/>

  <!-- Section: Central Card -->
  <g id="central-card" filter="url(#softShadow)">
    <rect x="290" y="200" width="460" height="440" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Card header -->
    <rect x="290" y="200" width="460" height="56" rx="16" fill="#FFFFFF"/>
    <rect x="290" y="234" width="460" height="22" fill="#FFFFFF"/>

    <!-- Header icon circle -->
    <circle cx="318" cy="228" r="12" fill="#0A0A0A"/>
    <text x="346" y="233" class="heading" font-size="14">Stratégie de lancement</text>
    <!-- Close X -->
    <text x="720" y="233" class="caption" font-size="16" fill="#6B7280">×</text>

    <!-- Divider -->
    <line x1="306" y1="256" x2="734" y2="256" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Section 1: Format produit -->
    <g id="section-format">
      <text x="314" y="284" class="heading" font-size="13">Format produit</text>
      <!-- Chevron -->
      <path d="M726 276 L732 282 L726 288" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Placeholder lines -->
      <rect x="314" y="294" width="180" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="314" y="308" width="240" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="314" y="322" width="140" height="8" rx="4" fill="#F3F4F6"/>
      <text x="314" y="344" class="caption" font-size="11">Oct 10, 2026 à 16:58</text>
      <line x1="306" y1="356" x2="734" y2="356" stroke="#D1D5DB" stroke-width="1"/>
    </g>

    <!-- Section 2: Strategie -->
    <g id="section-strategie">
      <text x="314" y="380" class="heading" font-size="13">Stratégie : copier, résoudre ou découvrir</text>
      <!-- Chevron -->
      <path d="M726 372 L732 378 L726 384" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Placeholder lines -->
      <rect x="314" y="390" width="260" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="314" y="404" width="200" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="314" y="418" width="160" height="8" rx="4" fill="#F3F4F6"/>
      <line x1="306" y1="434" x2="734" y2="434" stroke="#D1D5DB" stroke-width="1"/>
    </g>

    <!-- Section 3: Objectif financier -->
    <g id="section-objectif">
      <text x="314" y="458" class="heading" font-size="13">Objectif financier</text>
      <!-- Chevron -->
      <path d="M726 450 L732 456 L726 462" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Placeholder lines -->
      <rect x="314" y="468" width="220" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="314" y="482" width="170" height="8" rx="4" fill="#F3F4F6"/>
      <line x1="306" y1="498" x2="734" y2="498" stroke="#D1D5DB" stroke-width="1"/>
    </g>

    <!-- Bottom status -->
    <rect x="314" y="572" width="432" height="52" rx="8" fill="#F3F4F6"/>
    <rect x="322" y="582" width="120" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="322" y="596" width="80" height="6" rx="3" fill="#D1D5DB"/>
  </g>

  <!-- Section: Floating icon tile - top-left (document) -->
  <g id="tile-document" transform="rotate(-4, 120, 180)" filter="url(#softShadow)">
    <rect x="80" y="140" width="80" height="80" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Document icon -->
    <rect x="108" y="158" width="24" height="30" rx="2" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    <path d="M116 158 L116 165 L123 165" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
    <line x1="111" y1="172" x2="129" y2="172" stroke="#0A0A0A" stroke-width="1.5"/>
    <line x1="111" y1="177" x2="127" y2="177" stroke="#0A0A0A" stroke-width="1.5"/>
    <line x1="111" y1="182" x2="123" y2="182" stroke="#0A0A0A" stroke-width="1.5"/>
  </g>

  <!-- Section: Floating icon tile - top-right (gear) -->
  <g id="tile-gear" transform="rotate(3, 860, 170)" filter="url(#softShadow)">
    <rect x="820" y="130" width="80" height="80" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Gear icon -->
    <circle cx="860" cy="170" r="8" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    <circle cx="860" cy="170" r="3" fill="#0A0A0A"/>
    <path d="M860 154 L862 162 L858 162 Z" fill="#0A0A0A"/>
    <path d="M860 186 L862 178 L858 178 Z" fill="#0A0A0A"/>
    <path d="M844 170 L852 172 L852 168 Z" fill="#0A0A0A"/>
    <path d="M876 170 L868 172 L868 168 Z" fill="#0A0A0A"/>
    <path d="M848 158 L854 165 L851 168 Z" fill="#0A0A0A"/>
    <path d="M872 182 L866 175 L869 172 Z" fill="#0A0A0A"/>
    <path d="M848 182 L855 175 L852 172 Z" fill="#0A0A0A"/>
    <path d="M872 158 L865 165 L868 168 Z" fill="#0A0A0A"/>
  </g>

  <!-- Section: Floating icon tile - left (database) -->
  <g id="tile-database" transform="rotate(-3, 116, 400)" filter="url(#softShadow)">
    <rect x="76" y="360" width="80" height="80" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Database cylinder icon -->
    <ellipse cx="116" cy="378" rx="14" ry="5" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    <line x1="102" y1="378" x2="102" y2="416" stroke="#0A0A0A" stroke-width="2"/>
    <line x1="130" y1="378" x2="130" y2="416" stroke="#0A0A0A" stroke-width="2"/>
    <ellipse cx="116" cy="416" rx="14" ry="5" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    <ellipse cx="116" cy="393" rx="14" ry="5" fill="none" stroke="#0A0A0A" stroke-width="1.5" stroke-dasharray="3 2"/>
  </g>

  <!-- Section: Floating icon tile - right (chart bars) -->
  <g id="tile-chart" transform="rotate(5, 870, 400)" filter="url(#softShadow)">
    <rect x="830" y="360" width="80" height="80" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Chart bars icon -->
    <rect x="843" y="400" width="10" height="20" rx="1" fill="#0A0A0A"/>
    <rect x="857" y="388" width="10" height="32" rx="1" fill="#0A0A0A"/>
    <rect x="871" y="394" width="10" height="26" rx="1" fill="#0A0A0A"/>
    <line x1="840" y1="422" x2="884" y2="422" stroke="#0A0A0A" stroke-width="1.5"/>
  </g>

  <!-- Section: Hand-drawn arrows -->
  <!-- Arrow from document tile to card -->
  <path d="M162 185 C210 200, 250 215, 288 240" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M283 236 L290 242 L282 246" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow from gear tile to card -->
  <path d="M818 200 C790 210, 762 222, 752 250" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="4 4"/>
  <path d="M756 244 L751 252 L759 253" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow from database tile to card -->
  <path d="M158 400 C210 400, 250 400, 288 420" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M283 416 L291 421 L283 427" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow from chart tile to card -->
  <path d="M828 400 C790 400, 762 400, 752 420" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="4 4"/>
  <path d="M756 415 L750 422 L758 424" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Section: Bottom-left branching sketch -->
  <g id="sketch-branches">
    <text x="80" y="630" class="caption" font-size="11" fill="#6B7280" font-style="italic">type de produit</text>
    <!-- Branch lines -->
    <line x1="140" y1="650" x2="140" y2="700" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M140 680 C130 680, 90 680, 80 700" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M140 680 C150 680, 190 680, 200 700" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M140 680 C140 680, 140 680, 140 700" stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Labels -->
    <text x="58" y="716" class="body" font-size="12" fill="#0A0A0A">App</text>
    <text x="128" y="716" class="body" font-size="12" fill="#0A0A0A">SaaS</text>
    <text x="185" y="716" class="body" font-size="12" fill="#0A0A0A">Logiciel</text>
    <!-- Small circles at branch ends -->
    <circle cx="80" cy="702" r="3" fill="#0A0A0A"/>
    <circle cx="140" cy="702" r="3" fill="#0A0A0A"/>
    <circle cx="200" cy="702" r="3" fill="#0A0A0A"/>
  </g>

  <!-- Section: Bottom-right strategy sketch -->
  <g id="sketch-strategy">
    <rect x="800" y="620" width="160" height="90" rx="6" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
    <text x="840" y="644" class="heading" font-size="13" letter-spacing="2">STRATÉGIE</text>
    <rect x="812" y="652" width="136" height="7" rx="3" fill="#F3F4F6"/>
    <rect x="812" y="665" width="110" height="7" rx="3" fill="#F3F4F6"/>
    <rect x="812" y="678" width="90" height="7" rx="3" fill="#F3F4F6"/>
    <!-- Corner accent -->
    <path d="M800 632 L800 620 L812 620" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M948 628 L960 620 L960 632" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

</svg>
